<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1440"/>
<title>Mesh Rider Fleet NMS · Doodle Labs</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css"/>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>
<script type="text/babel" src="views.jsx"></script>

<script type="text/babel" data-presets="react">
function App() {
  const [view, setView] = useState('fleet');
  const [tenant, setTenant] = useState(TENANTS[0]);
  const [radioId, setRadioId] = useState(null);

  const onOpenRadio = (id) => { setRadioId(id); setView('radio'); };

  let content;
  if (view === 'fleet')    content = <FleetView onOpenRadio={onOpenRadio}/>;
  else if (view === 'topology') content = <TopologyView onOpenRadio={onOpenRadio}/>;
  else if (view === 'radio')    content = <RadioDetail id={radioId ?? 4} onBack={()=>setView('fleet')}/>;
  else if (view === 'ota')      content = <OTAView/>;
  else if (view === 'spectrum') content = <SpectrumView/>;
  else if (view === 'alerts')   content = <AlertsView/>;
  else if (view === 'audit')    content = <AuditView/>;
  else if (view === 'access')   content = <AccessView/>;
  else content = <FleetView onOpenRadio={onOpenRadio}/>;

  return (
    <div className="hstack" style={{ height:'100vh', width:'100vw', minHeight:0, overflow:'hidden' }}>
      <Sidebar active={view} onNav={setView} tenant={tenant} setTenant={setTenant}/>
      <div className="vstack flex1" style={{ minWidth:0, minHeight:0 }}>
        <Topbar view={view}/>
        {content}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
